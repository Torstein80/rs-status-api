services:
  rs-status-api:
    image: ghcr.io/torstein80/rs-status-api:latest
    container_name: rs-status-api
    restart: unless-stopped
    environment:
      VESSEL_MMSI: ${VESSEL_MMSI:-}
      RS_ID: ${RS_ID:-127}
      RS_NAME: ${RS_NAME:-Anne-Lise}
      STATUS_HISTORY_FILE: /data/status_text_history.json
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: 8080
      CACHE_SECONDS: 120
      REQUEST_TIMEOUT: 20
      TZ: Europe/Oslo
    volumes:
      - rs-status-data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  rs-status-data:
